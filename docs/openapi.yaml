openapi: 3.0.3
info:
  title: TNY Catálogo — API
  description: |
    API do catálogo online da TNY. Cobre as funcionalidades públicas do cliente
    (visualização de catálogo, carrinho/pedido via WhatsApp, newsletter) e as
    rotas administrativas.

    ## Convenções
    - Identificadores, rotas e propriedades em inglês (`snake_case` em JSON).
    - Datas em ISO 8601 (`YYYY-MM-DDTHH:mm:ssZ`).
    - Preços em decimal com 2 casas (ex.: `89.90`).
    - Paginação por `page` (1-indexed) e `limit`. Resposta inclui `meta`.
    - Rotas sob `/admin` exigem header `Authorization: Bearer <token>`.

    ## Lógica de preço (herança Product → Variant) e promoção
    Cada Product pode ter `promotional_price` (nullable). Quando preenchido,
    significa que o produto está em promoção.

    Regra de resolução do preço efetivo (`final_price` em cada Variant):
    1. Se `Product.promotional_price` está preenchido, é ele — para TODAS as
       variações, independente do `Variant.price`. (Promoção sobrescreve preço
       de variação.)
    2. Caso contrário, herança normal: `Variant.price` se existir, senão
       `Product.price`.

    O `promotional_price` do Product também é retornado para o frontend exibir
    o padrão "de/por" (preço cheio riscado + promocional em destaque).

    ## Imagens — regra de exibição
    Capa e galeria principal priorizam imagens com `variant_id = null`. Se o
    produto não tiver imagens gerais, o backend cai para as imagens da primeira
    variação. Se não houver nenhuma, retorna `null` em `cover_image` e o cliente
    exibe placeholder.
  version: 1.0.0
  contact:
    name: Projeto Integrador I — TNY

servers:
  - url: http://localhost:3000
    description: Local
  - url: https://api.tny.example.com
    description: Produção

tags:
  - name: Categories (public)
    description: Listagem de categorias para navegação do cliente.
  - name: Products (public)
    description: Catálogo, busca e detalhes dos produtos.
  - name: Orders (public)
    description: Registro de pedidos antes do redirecionamento ao WhatsApp.
  - name: Leads (public)
    description: Cadastro opcional para newsletter/promoções.
  - name: Authentication
    description: Login e sessão do administrador.
  - name: Admin — Products
  - name: Admin — Variants
  - name: Admin — Images
  - name: Admin — Categories
  - name: Admin — Orders
  - name: Admin — Leads
  - name: Admin — Administrators

security: []

paths:

  # public: categories
  /categories:
    get:
      tags: [Categories (public)]
      summary: Listar categorias
      responses:
        '200':
          description: Lista de categorias
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }

  /categories/{id}:
    get:
      tags: [Categories (public)]
      summary: Detalhe de uma categoria
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Categoria encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
        '404': { $ref: '#/components/responses/NotFound' }

  # public: products
  /products:
    get:
      tags: [Products (public)]
      summary: Listar produtos (com filtros e busca)
      description: |
        Retorna produtos ativos. Suporta filtro por categoria e busca por nome.
        Cada produto traz `cover_image` resolvida e `price` base
        (e `promotional_price` se em promoção).
      parameters:
        - in: query
          name: category_id
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
          description: Busca por nome do produto (case-insensitive, parcial).
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: Lista paginada de produtos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProductSummary' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  /products/{id}:
    get:
      tags: [Products (public)]
      summary: Detalhe completo do produto
      description: |
        Retorna o produto com suas variações, imagens e categorias. Cada
        variação retorna `final_price` (resolvido pela regra de herança +
        promoção) e `quantity` (estoque).
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Produto encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProductDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{id}/related:
    get:
      tags: [Products (public)]
      summary: Produtos relacionados ("Veja também")
      description: |
        Retorna produtos ativos das mesmas categorias do produto informado,
        excluindo ele próprio. Ordem aleatória, limitado a `limit`.
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - in: query
          name: limit
          schema: { type: integer, default: 4, minimum: 1, maximum: 12 }
      responses:
        '200':
          description: Lista de produtos relacionados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProductSummary' }
        '404': { $ref: '#/components/responses/NotFound' }

  # public: orders
  /orders:
    post:
      tags: [Orders (public)]
      summary: Criar pedido (antes do redirect ao WhatsApp)
      description: |
        Registra o pedido com itens congelados (nome, cor, tamanho, preço
        unitário aplicando a regra de herança + promoção). Retorna `id` e
        `whatsapp_url` pronta para abrir. `status` inicial é `new`.

        O backend valida estoque (`Variant.quantity`) antes de aceitar.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderCreate' }
      responses:
        '201':
          description: Pedido criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/OrderCreatedResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409':
          description: Estoque insuficiente para alguma variação
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # public: leads
  /leads:
    post:
      tags: [Leads (public)]
      summary: Cadastrar lead para newsletter
      description: |
        Cadastro opcional para receber promoções. Em caso de email duplicado,
        atualiza silenciosamente os dados (upsert) e renova `consent_date`.
        `marketing_consent` é registrado por boas práticas de LGPD.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LeadCreate' }
      responses:
        '201':
          description: Lead cadastrado/atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Lead' }
        '400': { $ref: '#/components/responses/ValidationError' }

  # authentication
  /admin/auth/login:
    post:
      tags: [Authentication]
      summary: Login do administrador
      description: Retorna um JWT (Bearer, validade 1 dia). Auth é Bearer-only, sem cookie de refresh.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token: { type: string }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401':
          description: Credenciais inválidas (code INVALID_CREDENTIALS)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/auth/me:
    get:
      tags: [Authentication]
      summary: Dados do admin logado
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Admin atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Admin' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Sessão encerrada }

  # admin: products
  /admin/products:
    get:
      tags: [Admin — Products]
      summary: Listar produtos (admin)
      description: Inclui produtos inativos. Filtros opcionais.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: category_id
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProductSummary' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      tags: [Admin — Products]
      summary: Criar produto
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
      responses:
        '201':
          description: Criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProductDetail' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/products/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Admin — Products]
      summary: Detalhe (admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Produto
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProductDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Admin — Products]
      summary: Atualizar produto
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductUpdate' }
      responses:
        '200':
          description: Atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProductDetail' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Admin — Products]
      summary: Remover produto (soft delete via `active=false`)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removido }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/categories:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Admin — Products]
      summary: Substituir categorias do produto
      description: Substitui o conjunto inteiro de categorias associadas.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_ids]
              properties:
                category_ids:
                  type: array
                  items: { type: integer }
      responses:
        '200':
          description: Associações atualizadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
        '404': { $ref: '#/components/responses/NotFound' }

  # admin: variants
  /admin/products/{id}/variants:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Admin — Variants]
      summary: Listar variações de um produto
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista de variações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Variant' }
    post:
      tags: [Admin — Variants]
      summary: Criar variação
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantCreate' }
      responses:
        '201':
          description: Criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Variant' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/variants/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Admin — Variants]
      summary: Atualizar variação (estoque e preço próprio)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantUpdate' }
      responses:
        '200':
          description: Atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Variant' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Admin — Variants]
      summary: Remover variação
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  # admin: images
  /admin/products/{id}/images:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Admin — Images]
      summary: Cadastrar imagem do produto (por URL)
      description: |
        A imagem é referenciada por `url` já hospedada (não há upload binário /
        storage configurado). Se `variant_id` for enviado, a imagem é específica
        daquela variação; se `null` ou omitido, é imagem geral do produto.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImageCreate' }
      responses:
        '201':
          description: Imagem cadastrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Image' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/images/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Admin — Images]
      summary: Atualizar metadados da imagem
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variant_id:
                  type: integer
                  nullable: true
                alt_text: { type: string }
                position: { type: integer }
      responses:
        '200':
          description: Atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Image' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Admin — Images]
      summary: Remover imagem
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  # admin: categories
  /admin/categories:
    get:
      tags: [Admin — Categories]
      summary: Listar categorias
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
    post:
      tags: [Admin — Categories]
      summary: Criar categoria
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryCreate' }
      responses:
        '201':
          description: Criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }

  /admin/categories/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Admin — Categories]
      summary: Atualizar categoria
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryCreate' }
      responses:
        '200':
          description: Atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Admin — Categories]
      summary: Remover categoria
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removida }
        '404': { $ref: '#/components/responses/NotFound' }

  # admin: orders
  /admin/orders:
    get:
      tags: [Admin — Orders]
      summary: Listar pedidos
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [new, fulfilled, ignored]
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/OrderSummary' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  /admin/orders/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Admin — Orders]
      summary: Detalhe do pedido
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pedido com itens congelados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/OrderDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/orders/{id}/status:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Admin — Orders]
      summary: Atualizar status do pedido
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [new, fulfilled, ignored]
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/OrderSummary' }
        '404': { $ref: '#/components/responses/NotFound' }

  # admin: leads
  /admin/leads:
    get:
      tags: [Admin — Leads]
      summary: Listar leads
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Busca por nome ou email
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Lead' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  /admin/leads/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    delete:
      tags: [Admin — Leads]
      summary: Remover lead (direito de exclusão — LGPD)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removido }
        '404': { $ref: '#/components/responses/NotFound' }

  # admin: administrators
  /admin/admins:
    get:
      tags: [Admin — Administrators]
      summary: Listar admins
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Admin' }
    post:
      tags: [Admin — Administrators]
      summary: Criar admin
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminCreate' }
      responses:
        '201':
          description: Criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Admin' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/admins/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Admin — Administrators]
      summary: Atualizar admin (inclui ativo/inativo)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminUpdate' }
      responses:
        '200':
          description: Atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Admin' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Admin — Administrators]
      summary: Remover admin
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Removido }

# components
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }

  responses:
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Não autenticado ou token inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Erro de validação
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationError' }
    Conflict:
      description: Conflito de unicidade (sku/email já existente)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    # generics
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: NOT_FOUND }
            message: { type: string, example: Recurso não encontrado }

    ValidationError:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: VALIDATION_ERROR }
            message: { type: string }
            fields:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

    PaginationMeta:
      type: object
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 137 }
        total_pages: { type: integer, example: 7 }

    # category
    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, example: Camisetas }
        description: { type: string, nullable: true }

    CategoryCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 100 }
        description: { type: string, nullable: true }

    # product
    ProductSummary:
      type: object
      properties:
        id: { type: integer }
        sku: { type: string }
        name: { type: string }
        price:
          type: number
          format: float
          example: 89.90
          description: Preço cheio base.
        promotional_price:
          type: number
          format: float
          nullable: true
          example: 69.90
          description: |
            Preço com desconto. Se preenchido, o produto está em promoção e
            este valor sobrescreve qualquer `Variant.price` próprio.
        active: { type: boolean }
        cover_image:
          type: string
          format: uri
          nullable: true
          description: URL resolvida pelo backend (regra de fallback).
        categories:
          type: array
          items: { $ref: '#/components/schemas/Category' }

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description: { type: string }
            created_at: { type: string, format: date-time }
            variants:
              type: array
              items: { $ref: '#/components/schemas/Variant' }
            images:
              type: array
              items: { $ref: '#/components/schemas/Image' }

    ProductCreate:
      type: object
      required: [sku, name, description, price]
      properties:
        sku: { type: string, maxLength: 50 }
        name: { type: string, maxLength: 150 }
        description: { type: string }
        price: { type: number, format: float, minimum: 0 }
        promotional_price:
          type: number
          format: float
          minimum: 0
          nullable: true
          description: Opcional. Se preenchido, ativa promoção.
        active: { type: boolean, default: true }
        category_ids:
          type: array
          items: { type: integer }

    ProductUpdate:
      type: object
      properties:
        sku: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: number, format: float }
        promotional_price:
          type: number
          format: float
          minimum: 0
          nullable: true
          description: Enviar `null` para encerrar promoção.
        active: { type: boolean }
        category_ids:
          type: array
          items: { type: integer }

    # variant
    Variant:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: integer }
        variant_sku: { type: string }
        color: { type: string, example: Preto }
        size: { type: string, example: M }
        quantity: { type: integer, example: 12 }
        price:
          type: number
          format: float
          nullable: true
          description: Preço próprio da variação. Se null, herda do Product.
        final_price:
          type: number
          format: float
          description: |
            Preço efetivo resolvido (read-only). Regra:
            1) Se o Product tem `promotional_price` preenchido, é ele.
            2) Senão, `Variant.price` se existir, senão `Product.price`.

    VariantCreate:
      type: object
      required: [variant_sku, color, size, quantity]
      properties:
        variant_sku: { type: string }
        color: { type: string }
        size: { type: string }
        quantity: { type: integer, minimum: 0 }
        price:
          type: number
          format: float
          nullable: true
          minimum: 0

    VariantUpdate:
      type: object
      properties:
        variant_sku: { type: string }
        color: { type: string }
        size: { type: string }
        quantity: { type: integer, minimum: 0 }
        price:
          type: number
          format: float
          nullable: true

    # image
    Image:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: integer }
        variant_id:
          type: integer
          nullable: true
        url: { type: string, format: uri }
        alt_text: { type: string, nullable: true }
        position: { type: integer, example: 0 }

    ImageCreate:
      type: object
      required: [url]
      properties:
        url: { type: string }
        variant_id: { type: integer, nullable: true }
        alt_text: { type: string, nullable: true }
        position: { type: integer, minimum: 0, default: 0 }

    # lead
    Lead:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        marketing_consent: { type: boolean, example: true }
        consent_date: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    LeadCreate:
      type: object
      required: [name, email, phone]
      properties:
        name: { type: string, maxLength: 150 }
        email: { type: string, format: email }
        phone: { type: string, example: '+5585999999999' }
        marketing_consent:
          type: boolean
          default: true
          description: Padrão `true` — o cadastro é explicitamente opt-in.

    # order
    OrderItemCreate:
      type: object
      required: [variant_id, quantity]
      properties:
        variant_id: { type: integer }
        quantity: { type: integer, minimum: 1 }

    OrderItem:
      type: object
      properties:
        id: { type: integer }
        variant_id: { type: integer }
        product_name: { type: string }
        color: { type: string }
        size: { type: string }
        quantity: { type: integer }
        unit_price: { type: number, format: float }
        subtotal: { type: number, format: float }

    OrderCreate:
      type: object
      required: [name, phone, items]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string, format: email, nullable: true }
        payment_method:
          type: string
          enum: [to_be_defined, boleto, credit_card, cash, pix, bank_transfer]
          example: pix
        message:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OrderItemCreate' }

    OrderCreatedResponse:
      type: object
      properties:
        id: { type: integer }
        total: { type: number, format: float }
        status: { type: string, example: new }
        created_at: { type: string, format: date-time }
        whatsapp_url:
          type: string
          format: uri
          description: URL pronta no formato `https://wa.me/...?text=...` para redirect.
        whatsapp_message:
          type: string
          description: Texto da mensagem já formatado.

    OrderSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        total: { type: number, format: float }
        status:
          type: string
          enum: [new, fulfilled, ignored]
        created_at: { type: string, format: date-time }

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            email: { type: string, nullable: true }
            payment_method:
              type: string
              enum: [to_be_defined, boleto, credit_card, cash, pix, bank_transfer]
            message: { type: string, nullable: true }
            notes: { type: string, nullable: true }
            items:
              type: array
              items: { $ref: '#/components/schemas/OrderItem' }

    # admin
    Admin:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        active: { type: boolean }
        created_at: { type: string, format: date-time }

    AdminCreate:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 6 }

    AdminUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 6 }
        active: { type: boolean }
