services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tny
      POSTGRES_PASSWORD: tny
      POSTGRES_DB: tny
    ports:
      # host 5433 to avoid clashing with a local postgres on 5432
      - "5433:5432"
    volumes:
      - tny_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tny -d tny"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgres}
      # ainda testando
      # kept internal (not from .env's DATABASE_URL): inside the compose network the
      # container reaches Postgres via the service name `db:5432`, whereas the host's
      # .env points at localhost:5433 (the published port) for host-side tooling.
      DATABASE_URL: postgresql://tny:tny@db:5432/tny
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-}

volumes:
  tny_pgdata:
